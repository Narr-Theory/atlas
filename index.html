<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Atlas</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #atlas-svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<object id="atlas-svg" type="image/svg+xml" data="atlas.svg">
    Your browser does not support SVGs
</object>

<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<script>
    var svgObject = document.getElementById('atlas-svg');
    svgObject.addEventListener('load', function() {
        svgPanZoom(svgObject, {
            zoomEnabled: true,
            controlIconsEnabled: true,
            fit: true,
            center: true,
            minZoom: 0.5,
            maxZoom: 20
        });
    });
</script>
</body>
</html>
